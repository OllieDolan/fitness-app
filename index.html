<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitRank X</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#000810;--cyan:#00f5ff;--blue:#0080ff;--orange:#ff6600;--card-bg:rgba(0,20,40,0.85)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--cyan);font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);pointer-events:none;z-index:1}

.screen{display:none;position:relative;z-index:2}
.active{display:block}

/* SPLASH */
#splash{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
#splash.active{display:flex}
.splash-box{border:1px solid var(--cyan);box-shadow:0 0 30px var(--cyan),inset 0 0 30px rgba(0,245,255,0.05);padding:40px;width:100%;max-width:420px;background:var(--card-bg);text-align:center;position:relative;animation:pulse-border 4s ease-in-out infinite}
.splash-box::before,.splash-box::after{content:'';position:absolute;width:16px;height:16px;border-color:var(--orange);border-style:solid}
.splash-box::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.splash-box::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
@keyframes pulse-border{0%,100%{box-shadow:0 0 30px var(--cyan),inset 0 0 30px rgba(0,245,255,0.05)}50%{box-shadow:0 0 55px var(--cyan),inset 0 0 50px rgba(0,245,255,0.08)}}

.logo{font-family:'Orbitron',sans-serif;font-size:48px;font-weight:900;letter-spacing:6px;color:var(--cyan);text-shadow:0 0 20px var(--cyan),0 0 60px var(--cyan),0 0 100px rgba(0,245,255,0.4);margin-bottom:8px;animation:flicker 6s infinite}
.tagline{color:var(--orange);font-size:11px;letter-spacing:4px;margin-bottom:36px;text-shadow:0 0 10px var(--orange)}
@keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:0.8}94%{opacity:1}96%{opacity:0.9}97%{opacity:1}}

/* INPUTS */
.tron-input{width:100%;background:rgba(0,245,255,0.05);border:1px solid var(--cyan);color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:15px;padding:11px 14px;letter-spacing:2px;outline:none;box-shadow:0 0 10px rgba(0,245,255,0.2),inset 0 0 10px rgba(0,245,255,0.05);transition:box-shadow 0.3s;margin-bottom:18px}
.tron-input:focus{box-shadow:0 0 20px rgba(0,245,255,0.5),inset 0 0 10px rgba(0,245,255,0.1)}
.tron-input::placeholder{color:rgba(0,245,255,0.3);letter-spacing:3px}
.tron-select{width:100%;background:rgba(0,245,255,0.05);border:1px solid rgba(0,245,255,0.4);color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:14px;padding:10px 12px;outline:none;cursor:pointer;transition:border-color 0.3s,box-shadow 0.3s;appearance:none}
.tron-select:focus{border-color:var(--cyan);box-shadow:0 0 10px rgba(0,245,255,0.3)}
.tron-select option{background:#000810}

/* BUTTONS */
.btn{background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;padding:12px 24px;cursor:pointer;text-shadow:0 0 10px var(--cyan);box-shadow:0 0 15px rgba(0,245,255,0.3);transition:all 0.2s}
.btn:hover{box-shadow:0 0 30px rgba(0,245,255,0.7),inset 0 0 20px rgba(0,245,255,0.1);background:rgba(0,245,255,0.08)}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.5;cursor:default;pointer-events:none}
.btn-orange{border-color:var(--orange);color:var(--orange);text-shadow:0 0 10px var(--orange);box-shadow:0 0 15px rgba(255,102,0,0.3)}
.btn-orange:hover{box-shadow:0 0 30px rgba(255,102,0,0.7),inset 0 0 20px rgba(255,102,0,0.1);background:rgba(255,102,0,0.08)}
.btn-sm{padding:8px 16px;font-size:10px}

/* TOP BAR */
.top{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid rgba(0,245,255,0.2);background:rgba(0,8,16,0.95);position:sticky;top:0;z-index:10;box-shadow:0 0 20px rgba(0,245,255,0.1)}
.top-name{font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:3px;color:var(--cyan);text-shadow:0 0 10px var(--cyan)}
.top-right{display:flex;align-items:center;gap:14px}
.top-pts{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:var(--orange);text-shadow:0 0 15px var(--orange);letter-spacing:2px}
.nav-btn{background:none;border:1px solid rgba(0,245,255,0.25);color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;padding:6px 12px;cursor:pointer;transition:all 0.2s}
.nav-btn:hover{border-color:var(--cyan);box-shadow:0 0 10px rgba(0,245,255,0.3)}

/* CARDS */
.card{background:var(--card-bg);border:1px solid rgba(0,245,255,0.2);margin:14px;padding:18px;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.5}
.card-label{font-size:10px;letter-spacing:4px;color:rgba(0,245,255,0.5);margin-bottom:10px;text-transform:uppercase}

/* STAT ROW */
.stat-row{display:flex;gap:14px;margin:14px}
.stat-box{flex:1;background:var(--card-bg);border:1px solid rgba(0,245,255,0.2);padding:14px;text-align:center}
.stat-num{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:var(--cyan);text-shadow:0 0 20px var(--cyan),0 0 40px rgba(0,245,255,0.4)}
.stat-lbl{font-size:9px;letter-spacing:3px;color:rgba(0,245,255,0.4);margin-top:4px}

/* PROGRESS */
.progress-label{display:flex;justify-content:space-between;font-size:10px;letter-spacing:2px;color:rgba(0,245,255,0.4);margin-bottom:6px}
.progress{height:4px;background:rgba(0,245,255,0.1);position:relative;overflow:hidden}
.bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));box-shadow:0 0 10px var(--cyan),0 0 20px rgba(0,245,255,0.5);transition:width 0.5s cubic-bezier(0.4,0,0.2,1);position:relative}
.bar::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:white;box-shadow:0 0 8px var(--cyan),0 0 16px var(--cyan)}

/* ACTION CARDS */
.action-card{background:var(--card-bg);border:1px solid rgba(0,245,255,0.2);margin:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.3s,box-shadow 0.3s;position:relative}
.action-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3}
.action-card.done{border-color:rgba(0,245,255,0.5);box-shadow:inset 0 0 20px rgba(0,245,255,0.05)}
.action-left{display:flex;align-items:center;gap:14px}
.action-icon{font-size:26px;transition:transform 0.3s}
.action-name{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:3px;color:var(--cyan);text-shadow:0 0 8px rgba(0,245,255,0.4)}
.action-sub{font-size:10px;color:rgba(0,245,255,0.4);letter-spacing:2px;margin-top:3px}
.done-check{color:var(--cyan);font-size:18px;text-shadow:0 0 10px var(--cyan);animation:pop-in 0.3s ease-out}
@keyframes pop-in{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}

/* BADGES */
.badge{display:inline-block;border:1px solid var(--orange);color:var(--orange);font-size:10px;letter-spacing:2px;padding:3px 8px;margin:3px;text-shadow:0 0 8px var(--orange);box-shadow:0 0 8px rgba(255,102,0,0.3)}
#badges-wrap{margin-top:8px;min-height:28px}
.challenge-text{font-size:13px;letter-spacing:1px;color:rgba(0,245,255,0.8);margin:8px 0 14px}

/* ====== ANIMATION OVERLAY ====== */
#anim-overlay{position:fixed;inset:0;background:rgba(0,8,16,0.93);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center}
#anim-overlay.show{display:flex}
.anim-fig{width:130px;height:170px}
.anim-fig svg{width:100%;height:100%;filter:drop-shadow(0 0 8px var(--cyan)) drop-shadow(0 0 24px rgba(0,245,255,0.5))}
.anim-fig svg.orange-glow{filter:drop-shadow(0 0 8px var(--orange)) drop-shadow(0 0 24px rgba(255,102,0,0.5))}
.anim-pts{font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;color:var(--cyan);text-shadow:0 0 20px var(--cyan),0 0 40px var(--cyan);animation:pts-float 1.5s ease-out forwards;margin-top:16px}
.anim-lbl{font-size:11px;letter-spacing:4px;color:rgba(0,245,255,0.6);animation:pts-float 1.5s ease-out forwards;animation-delay:0.1s;margin-top:6px}
@keyframes pts-float{0%{opacity:0;transform:translateY(20px) scale(0.8)}30%{opacity:1;transform:translateY(0) scale(1.1)}70%{opacity:1;transform:translateY(-10px) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(0.9)}}

/* ====== PROFILE PAGE ====== */
.profile-section{background:var(--card-bg);border:1px solid rgba(0,245,255,0.2);margin:14px;padding:20px;position:relative}
.profile-section::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.5}
.section-title{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:4px;color:rgba(0,245,255,0.5);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid rgba(0,245,255,0.1)}
.field-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.field-group{flex:1;min-width:90px}
.field-label{font-size:9px;letter-spacing:3px;color:rgba(0,245,255,0.5);margin-bottom:6px;display:block}

/* CALCULATED STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.calc-stat{background:rgba(0,245,255,0.03);border:1px solid rgba(0,245,255,0.15);padding:14px;text-align:center}
.calc-val{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;color:var(--cyan);text-shadow:0 0 10px rgba(0,245,255,0.5)}
.calc-lbl{font-size:9px;letter-spacing:2px;color:rgba(0,245,255,0.4);margin-top:4px}
.bmi-bar{height:8px;background:rgba(0,245,255,0.1);margin:10px 0 4px;position:relative}
.bmi-fill{height:100%;transition:width 0.6s}
.bmi-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:50%;background:white;box-shadow:0 0 8px var(--cyan),0 0 16px var(--cyan);transition:left 0.6s}
.bmi-labels{display:flex;justify-content:space-between;font-size:8px;letter-spacing:1px;color:rgba(0,245,255,0.3)}
.incomplete-msg{color:rgba(0,245,255,0.3);font-size:11px;letter-spacing:2px;text-align:center;padding:20px 0}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <div class="splash-box">
    <div class="logo">FITRANK X</div>
    <div class="tagline">PERFORMANCE TRACKING SYSTEM</div>
    <input id="n" class="tron-input" placeholder="ENTER CALLSIGN" autocomplete="off">
    <button class="btn" onclick="startApp()">INITIALIZE</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="screen">
  <div class="top">
    <div class="top-name" id="user"></div>
    <div class="top-right">
      <div class="top-pts" id="pts"></div>
      <button class="nav-btn" onclick="showScreen('profile');loadProfileFields();renderCalc()">PROFILE</button>
    </div>
  </div>

  <div class="stat-row">
    <div class="stat-box">
      <div class="stat-num" id="streak">0</div>
      <div class="stat-lbl">DAY STREAK</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="lvl">—</div>
      <div class="stat-lbl">RANK</div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">RANK PROGRESS</div>
    <div class="progress-label"><span id="lvl2"></span><span id="pct"></span></div>
    <div class="progress"><div id="bar" class="bar" style="width:0%"></div></div>
  </div>

  <div class="action-card" id="walk-card">
    <div class="action-left">
      <div class="action-icon">🚶</div>
      <div>
        <div class="action-name">WALK</div>
        <div class="action-sub">+20 PTS</div>
      </div>
    </div>
    <button class="btn btn-sm" id="walk-btn" onclick="doWalk()">LOG</button>
  </div>

  <div class="action-card" id="work-card">
    <div class="action-left">
      <div class="action-icon">💪</div>
      <div>
        <div class="action-name">WORKOUT</div>
        <div class="action-sub">+10 PTS</div>
      </div>
    </div>
    <button class="btn btn-sm" id="work-btn" onclick="doWork()">LOG</button>
  </div>

  <div class="card">
    <div class="card-label">DAILY DIRECTIVE</div>
    <div class="challenge-text" id="challenge">—</div>
    <button class="btn btn-orange btn-sm" id="ch-btn" onclick="doChallenge()">COMPLETE MISSION</button>
  </div>

  <div class="card" style="margin-bottom:24px">
    <div class="card-label">ACHIEVEMENTS</div>
    <div id="badges-wrap"><span style="color:rgba(0,245,255,0.3);font-size:11px;letter-spacing:2px">NO BADGES YET</span></div>
  </div>
</div>

<!-- PROFILE PAGE -->
<div id="profile" class="screen">
  <div class="top">
    <button class="nav-btn" onclick="showScreen('app');update()">← BACK</button>
    <div class="top-name">OPERATOR PROFILE</div>
    <button class="btn btn-sm" onclick="saveProfile()">SAVE</button>
  </div>

  <div class="profile-section">
    <div class="section-title">BIOMETRICS</div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">AGE</label>
        <input id="p-age" class="tron-input" type="number" placeholder="25" min="10" max="100" style="margin:0">
      </div>
      <div class="field-group">
        <label class="field-label">GENDER</label>
        <select id="p-gender" class="tron-select">
          <option value="">SELECT</option>
          <option value="male">MALE</option>
          <option value="female">FEMALE</option>
          <option value="other">OTHER</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">HEIGHT FT</label>
        <input id="p-ft" class="tron-input" type="number" placeholder="5" min="3" max="8" style="margin:0">
      </div>
      <div class="field-group">
        <label class="field-label">HEIGHT IN</label>
        <input id="p-in" class="tron-input" type="number" placeholder="10" min="0" max="11" style="margin:0">
      </div>
      <div class="field-group" style="min-width:110px">
        <label class="field-label">WEIGHT (LBS)</label>
        <input id="p-weight" class="tron-input" type="number" placeholder="165" min="50" max="600" style="margin:0">
      </div>
    </div>
  </div>

  <div class="profile-section">
    <div class="section-title">MISSION PARAMETERS</div>
    <div class="field-row">
      <div class="field-group" style="min-width:180px">
        <label class="field-label">FITNESS GOAL</label>
        <select id="p-goal" class="tron-select">
          <option value="">SELECT OBJECTIVE</option>
          <option value="lose">LOSE WEIGHT</option>
          <option value="gain">BUILD MUSCLE</option>
          <option value="maintain">MAINTAIN</option>
          <option value="endurance">ENDURANCE</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field-group" style="min-width:180px">
        <label class="field-label">ACTIVITY LEVEL</label>
        <select id="p-activity" class="tron-select">
          <option value="">SELECT LEVEL</option>
          <option value="sedentary">SEDENTARY (DESK JOB)</option>
          <option value="light">LIGHT (1-3 DAYS/WK)</option>
          <option value="moderate">MODERATE (3-5 DAYS/WK)</option>
          <option value="active">ACTIVE (6-7 DAYS/WK)</option>
          <option value="veryActive">VERY ACTIVE (ATHLETE)</option>
        </select>
      </div>
    </div>
  </div>

  <div class="profile-section" style="margin-bottom:24px">
    <div class="section-title">SYSTEM ANALYSIS</div>
    <div id="calc-output"><div class="incomplete-msg">COMPLETE PROFILE TO VIEW ANALYSIS</div></div>
  </div>
</div>

<!-- ANIMATION OVERLAY -->
<div id="anim-overlay">
  <div class="anim-fig" id="anim-fig"></div>
  <div class="anim-pts" id="anim-pts"></div>
  <div class="anim-lbl" id="anim-lbl"></div>
</div>

<script>
// ── SVG FIGURES ──────────────────────────────────────
const SVGS = {
  run:`<svg viewBox="0 0 100 140" fill="none" stroke="#00f5ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="50" cy="12" r="10"/>
    <line x1="50" y1="22" x2="50" y2="65"/>
    <g><line x1="50" y1="35" x2="28" y2="52"/>
      <animateTransform attributeName="transform" type="rotate" values="-35,50,35;35,50,35;-35,50,35" dur="0.44s" repeatCount="indefinite"/>
    </g>
    <g><line x1="50" y1="35" x2="72" y2="52"/>
      <animateTransform attributeName="transform" type="rotate" values="35,50,35;-35,50,35;35,50,35" dur="0.44s" repeatCount="indefinite"/>
    </g>
    <g><line x1="50" y1="65" x2="30" y2="100"/>
      <animateTransform attributeName="transform" type="rotate" values="-30,50,65;30,50,65;-30,50,65" dur="0.44s" repeatCount="indefinite"/>
    </g>
    <g><line x1="50" y1="65" x2="70" y2="100"/>
      <animateTransform attributeName="transform" type="rotate" values="30,50,65;-30,50,65;30,50,65" dur="0.44s" repeatCount="indefinite"/>
    </g>
  </svg>`,

  lift:`<svg viewBox="0 0 100 140" fill="none" stroke="#00f5ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="50" cy="12" r="10"/>
    <line x1="50" y1="22" x2="50" y2="75"/>
    <line x1="50" y1="75" x2="35" y2="108"/>
    <line x1="50" y1="75" x2="65" y2="108"/>
    <line x1="50" y1="38" x2="30" y2="58"/>
    <g>
      <line x1="50" y1="38" x2="70" y2="58"/>
      <line x1="68" y1="55" x2="82" y2="44"/>
      <line x1="79" y1="40" x2="86" y2="50"/>
      <animateTransform attributeName="transform" type="rotate" values="0,50,38;-60,50,38;0,50,38" dur="0.65s" repeatCount="indefinite"/>
    </g>
  </svg>`,

  win:`<svg viewBox="0 0 100 130" fill="none" stroke="#ff6600" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="50" cy="14" r="10"/>
    <line x1="50" y1="24" x2="50" y2="68"/>
    <line x1="50" y1="68" x2="35" y2="100"/>
    <line x1="50" y1="68" x2="65" y2="100"/>
    <g><line x1="50" y1="40" x2="22" y2="20"/>
      <animateTransform attributeName="transform" type="rotate" values="0,50,40;10,50,40;0,50,40" dur="0.5s" repeatCount="indefinite"/>
    </g>
    <g><line x1="50" y1="40" x2="78" y2="20"/>
      <animateTransform attributeName="transform" type="rotate" values="0,50,40;-10,50,40;0,50,40" dur="0.5s" repeatCount="indefinite"/>
    </g>
    <text x="6" y="32" font-size="18" fill="#ff6600" stroke="none">★</text>
    <text x="74" y="32" font-size="18" fill="#ff6600" stroke="none">★</text>
    <text x="41" y="125" font-size="14" fill="#ff6600" stroke="none">★</text>
  </svg>`
}

// ── STATE ─────────────────────────────────────────────
let s={name:'',pts:0,streak:0,last:null,walk:false,work:false,bonus:false,challengeDone:false,badges:[],challenge:'',profile:{age:'',gender:'',ft:'',in:'',weight:'',goal:'',activity:''}}

function save(){localStorage.setItem('fx',JSON.stringify(s))}
function load(){
  let d=localStorage.getItem('fx')
  if(d) s=JSON.parse(d)
  if(!s.profile) s.profile={age:'',gender:'',ft:'',in:'',weight:'',goal:'',activity:''}
  if(!s.challenge) s.challenge=''
}

// ── NAVIGATION ────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

// ── CORE LOGIC ────────────────────────────────────────
function startApp(){s.name=document.getElementById('n').value.toUpperCase();save();showScreen('app');update()}

function today(){return new Date().toDateString()}

function newDay(){
  if(s.last!==today()){
    if(s.walk&&s.work) s.streak++; else s.streak=0
    s.walk=false;s.work=false;s.bonus=false;s.challengeDone=false
    s.last=today();genChallenge()
  }
}

function addPts(p){let m=s.streak>=7?1.25:s.streak>=3?1.1:1;s.pts+=Math.floor(p*m)}

function doWalk(){
  newDay()
  if(!s.walk){s.walk=true;addPts(20);showAnim('run',20,'WALK LOGGED','var(--cyan)')}
  save();update()
}

function doWork(){
  newDay()
  let earned=0
  if(!s.work){s.work=true;addPts(10);earned=10}
  if(s.walk&&s.work&&!s.bonus){addPts(30);s.bonus=true;earned+=30}
  if(earned>0) showAnim('lift',earned,'WORKOUT LOGGED','var(--cyan)')
  save();update()
}

function doChallenge(){
  newDay()
  if(!s.challengeDone){addPts(40);s.challengeDone=true;unlockBadge('CHALLENGER');showAnim('win',40,'MISSION COMPLETE','var(--orange)')}
  save();update()
}

function level(){
  if(s.pts<500) return['ROOKIE',s.pts/500]
  if(s.pts<1500) return['ATHLETE',(s.pts-500)/1000]
  if(s.pts<4000) return['BEAST',(s.pts-1500)/2500]
  return['SAVAGE',1]
}

function genChallenge(){
  const list=["COMPLETE BOTH TASKS","EARN 50 PTS TODAY","MAINTAIN YOUR STREAK","JUST SHOW UP","GO THE EXTRA MILE","LOG BOTH ACTIVITIES"]
  s.challenge=list[Math.floor(Math.random()*list.length)]
}

function unlockBadge(b){if(!s.badges.includes(b))s.badges.push(b)}

// ── UPDATE UI ─────────────────────────────────────────
function update(){
  const [l,p]=level()
  document.getElementById('user').innerText='// '+s.name
  document.getElementById('pts').innerText=s.pts+' PTS'
  document.getElementById('streak').innerText=s.streak
  document.getElementById('lvl').innerText=l
  document.getElementById('lvl2').innerText=l
  document.getElementById('pct').innerText=Math.floor(p*100)+'%'
  document.getElementById('bar').style.width=(p*100)+'%'
  document.getElementById('challenge').innerText=s.challenge||'—'

  const bw=document.getElementById('badges-wrap')
  bw.innerHTML=s.badges.length
    ?s.badges.map(b=>`<span class="badge">${b}</span>`).join('')
    :'<span style="color:rgba(0,245,255,0.3);font-size:11px;letter-spacing:2px">NO BADGES YET</span>'

  // Action button states
  const wb=document.getElementById('walk-btn'),wc=document.getElementById('walk-card')
  const ob=document.getElementById('work-btn'),oc=document.getElementById('work-card')
  const cb=document.getElementById('ch-btn')

  if(s.walk){wb.innerHTML='<span class="done-check">✓</span>';wb.disabled=true;wc.classList.add('done')}
  else{wb.innerHTML='LOG';wb.disabled=false;wc.classList.remove('done')}

  if(s.work){ob.innerHTML='<span class="done-check">✓</span>';ob.disabled=true;oc.classList.add('done')}
  else{ob.innerHTML='LOG';ob.disabled=false;oc.classList.remove('done')}

  if(s.challengeDone){cb.innerHTML='COMPLETED ✓';cb.disabled=true}
  else{cb.innerHTML='COMPLETE MISSION';cb.disabled=false}
}

// ── ANIMATION OVERLAY ─────────────────────────────────
function showAnim(type,pts,label,color){
  const overlay=document.getElementById('anim-overlay')
  const fig=document.getElementById('anim-fig')
  const ptsEl=document.getElementById('anim-pts')
  const lblEl=document.getElementById('anim-lbl')

  fig.innerHTML=SVGS[type]
  if(type==='win') fig.querySelector('svg').classList.add('orange-glow')

  ptsEl.innerText='+'+pts+' PTS'
  ptsEl.style.color=color
  ptsEl.style.textShadow=`0 0 20px ${color}, 0 0 40px ${color}`
  lblEl.innerText=label
  lblEl.style.color=type==='win'?'rgba(255,102,0,0.7)':'rgba(0,245,255,0.6)'

  // Restart animations
  ptsEl.style.animation='none';lblEl.style.animation='none'
  requestAnimationFrame(()=>{
    ptsEl.style.animation='pts-float 1.5s ease-out forwards'
    lblEl.style.animation='pts-float 1.5s ease-out forwards 0.1s'
  })

  overlay.classList.add('show')
  setTimeout(()=>overlay.classList.remove('show'),1700)
}

// ── PROFILE ───────────────────────────────────────────
function loadProfileFields(){
  const p=s.profile
  document.getElementById('p-age').value=p.age||''
  document.getElementById('p-gender').value=p.gender||''
  document.getElementById('p-ft').value=p.ft||''
  document.getElementById('p-in').value=p.in||''
  document.getElementById('p-weight').value=p.weight||''
  document.getElementById('p-goal').value=p.goal||''
  document.getElementById('p-activity').value=p.activity||''
}

function saveProfile(){
  s.profile={
    age:document.getElementById('p-age').value,
    gender:document.getElementById('p-gender').value,
    ft:document.getElementById('p-ft').value,
    in:document.getElementById('p-in').value,
    weight:document.getElementById('p-weight').value,
    goal:document.getElementById('p-goal').value,
    activity:document.getElementById('p-activity').value
  }
  save();renderCalc()
}

function renderCalc(){
  const p=s.profile
  const out=document.getElementById('calc-output')
  if(!p.age||!p.gender||!p.ft||!p.weight||!p.activity){
    out.innerHTML='<div class="incomplete-msg">COMPLETE PROFILE TO VIEW ANALYSIS</div>'
    return
  }

  const weightKg=parseFloat(p.weight)*0.453592
  const heightCm=(parseFloat(p.ft)*12+parseFloat(p.in||0))*2.54
  const age=parseInt(p.age)

  // BMI
  const bmi=weightKg/((heightCm/100)**2)
  let bmiLabel='',bmiColor='var(--cyan)'
  if(bmi<18.5){bmiLabel='UNDERWEIGHT';bmiColor='#4fc3f7'}
  else if(bmi<25){bmiLabel='NORMAL';bmiColor='#00f5ff'}
  else if(bmi<30){bmiLabel='OVERWEIGHT';bmiColor='#ff9800'}
  else{bmiLabel='OBESE';bmiColor='#f44336'}

  // BMR (Mifflin-St Jeor)
  let bmr=p.gender==='male'
    ?10*weightKg+6.25*heightCm-5*age+5
    :10*weightKg+6.25*heightCm-5*age-161

  // TDEE
  const mult={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,veryActive:1.9}
  const tdee=Math.round(bmr*(mult[p.activity]||1.2))

  // Target calories
  const targets={lose:tdee-500,gain:tdee+300,maintain:tdee,endurance:tdee+200}
  const target=Math.round(targets[p.goal]||tdee)

  // BMI bar (range 15–40)
  const bmiPct=Math.min(100,Math.max(0,((bmi-15)/25)*100))

  out.innerHTML=`
    <div class="stats-grid">
      <div class="calc-stat">
        <div class="calc-val" style="color:${bmiColor};text-shadow:0 0 10px ${bmiColor}">${bmi.toFixed(1)}</div>
        <div class="calc-lbl">BMI · ${bmiLabel}</div>
      </div>
      <div class="calc-stat">
        <div class="calc-val">${Math.round(bmr)}</div>
        <div class="calc-lbl">BMR (KCAL/DAY)</div>
      </div>
      <div class="calc-stat">
        <div class="calc-val">${tdee}</div>
        <div class="calc-lbl">TDEE (KCAL/DAY)</div>
      </div>
      <div class="calc-stat" style="border-color:rgba(255,102,0,0.3)">
        <div class="calc-val" style="color:var(--orange);text-shadow:0 0 10px var(--orange)">${target}</div>
        <div class="calc-lbl">TARGET INTAKE</div>
      </div>
    </div>
    <div style="margin-top:16px">
      <div class="calc-lbl" style="margin-bottom:8px">BMI SPECTRUM</div>
      <div class="bmi-bar">
        <div class="bmi-fill" style="width:${bmiPct}%;background:linear-gradient(90deg,#4fc3f7,${bmiColor})"></div>
        <div class="bmi-dot" style="left:${bmiPct}%"></div>
      </div>
      <div class="bmi-labels"><span>UNDER</span><span>NORMAL</span><span>OVER</span><span>OBESE</span></div>
    </div>
    <div style="margin-top:14px;font-size:10px;letter-spacing:2px;color:rgba(0,245,255,0.35);line-height:2">
      ${p.ft}'${p.in||0}" &nbsp;·&nbsp; ${p.weight} LBS &nbsp;·&nbsp; AGE ${age}<br>
      ${p.goal?'OBJECTIVE: '+{lose:'WEIGHT LOSS',gain:'MUSCLE GAIN',maintain:'MAINTENANCE',endurance:'ENDURANCE'}[p.goal]:''}
    </div>
  `
}

// ── INIT ──────────────────────────────────────────────
load()
if(s.name){showScreen('app');update()}else{genChallenge()}
</script>
</body>
</html>
