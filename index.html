<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitRank X</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0118;
  --purple:#c44dff;
  --pink:#ff3399;
  --blue:#00d4ff;
  --green:#00ff88;
  --amber:#ffaa00;
  --text:#f0e6ff;
  --muted:rgba(240,230,255,0.45);
  --card:rgba(255,255,255,0.05);
  --card-border:rgba(255,255,255,0.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 60% 50% at 15% 15%,rgba(196,77,255,0.18) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 85% 10%,rgba(0,212,255,0.12) 0%,transparent 65%),
    radial-gradient(ellipse 55% 45% at 75% 88%,rgba(255,51,153,0.14) 0%,transparent 65%),
    radial-gradient(ellipse 40% 35% at 5% 90%,rgba(0,255,136,0.07) 0%,transparent 60%);
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  min-height:100vh;overflow-x:hidden;
}

/* Subtle star field */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1.5px 1.5px at 10% 15%,rgba(255,255,255,0.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 25% 42%,rgba(255,255,255,0.25) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 38% 8%,rgba(200,180,255,0.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 52% 78%,rgba(255,255,255,0.2) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 63% 22%,rgba(255,255,255,0.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 74% 55%,rgba(180,200,255,0.35) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 88% 35%,rgba(255,255,255,0.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 92% 70%,rgba(255,180,255,0.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 18% 68%,rgba(255,255,255,0.2) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 46% 50%,rgba(200,255,255,0.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 82% 88%,rgba(255,255,255,0.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 33% 90%,rgba(255,200,255,0.25) 0%,transparent 100%);
}

.screen{display:none;position:relative;z-index:2}
.active{display:block}

/* ── SPLASH ── */
#splash{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
#splash.active{display:flex}

.splash-box{
  width:100%;max-width:440px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:28px;
  padding:48px 40px;
  text-align:center;
  position:relative;
  box-shadow:0 30px 80px rgba(0,0,0,0.6),0 0 60px rgba(196,77,255,0.1),inset 0 1px 0 rgba(255,255,255,0.15);
  animation:nova-float 5s ease-in-out infinite;
}
@keyframes nova-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* Gradient border glow on splash */
.splash-box::before{
  content:'';position:absolute;inset:-1px;border-radius:29px;
  background:linear-gradient(135deg,rgba(196,77,255,0.6),rgba(255,51,153,0.4),rgba(0,212,255,0.3),rgba(196,77,255,0.6));
  z-index:-1;filter:blur(1px);
  animation:border-spin 4s linear infinite;
}
@keyframes border-spin{from{background-position:0% 50%}to{background-position:200% 50%}}

.logo{
  font-family:'Orbitron',sans-serif;font-size:46px;font-weight:900;letter-spacing:4px;
  background:linear-gradient(135deg,#c44dff,#ff3399,#00d4ff,#c44dff);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px;
  animation:gradient-shift 4s linear infinite, nova-pulse 3s ease-in-out infinite;
  filter:drop-shadow(0 0 20px rgba(196,77,255,0.6));
}
@keyframes gradient-shift{to{background-position:200% center}}
@keyframes nova-pulse{0%,100%{filter:drop-shadow(0 0 20px rgba(196,77,255,0.6))}50%{filter:drop-shadow(0 0 35px rgba(196,77,255,0.9)) drop-shadow(0 0 60px rgba(255,51,153,0.4))}}

.tagline{
  color:rgba(240,230,255,0.55);font-size:11px;letter-spacing:4px;
  margin-bottom:36px;min-height:16px;font-family:'Space Grotesk';
}

/* ── INPUTS ── */
.tron-input{
  width:100%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:12px;
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;font-size:15px;
  padding:13px 18px;letter-spacing:1px;outline:none;
  transition:all 0.3s;margin-bottom:16px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);
}
.tron-input:focus{border-color:rgba(196,77,255,0.6);box-shadow:0 0 0 3px rgba(196,77,255,0.15),inset 0 1px 0 rgba(255,255,255,0.08)}
.tron-input::placeholder{color:rgba(240,230,255,0.3)}
.tron-select{
  width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;
  padding:11px 14px;outline:none;cursor:pointer;transition:all 0.3s;appearance:none;
}
.tron-select:focus{border-color:rgba(196,77,255,0.5);box-shadow:0 0 0 3px rgba(196,77,255,0.12)}
.tron-select option{background:#1a0630}

/* ── BUTTONS ── */
.btn{
  background:linear-gradient(135deg,var(--purple),var(--pink));
  border:none;border-radius:12px;
  color:#fff;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;
  padding:13px 28px;cursor:pointer;
  box-shadow:0 4px 24px rgba(196,77,255,0.45),0 1px 0 rgba(255,255,255,0.2) inset;
  transition:all 0.2s;text-shadow:none;position:relative;overflow:hidden;
}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,0.12),transparent);border-radius:12px}
.btn:hover{box-shadow:0 6px 35px rgba(196,77,255,0.65),0 0 60px rgba(255,51,153,0.25);transform:translateY(-2px)}
.btn:active{transform:translateY(0) scale(0.98)}
.btn:disabled{opacity:0.35;cursor:default;pointer-events:none;transform:none}

.btn-orange{background:linear-gradient(135deg,var(--green),var(--blue));box-shadow:0 4px 24px rgba(0,255,136,0.4)}
.btn-orange:hover{box-shadow:0 6px 35px rgba(0,255,136,0.6),0 0 60px rgba(0,212,255,0.25)}

.btn-sm{padding:9px 18px;font-size:10px;border-radius:10px}

/* ── TOP BAR ── */
.top{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px;
  background:rgba(13,1,24,0.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,0.07);
  position:sticky;top:0;z-index:10;
  box-shadow:0 4px 30px rgba(0,0,0,0.3);
}
.top-name{
  font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:3px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.top-right{display:flex;align-items:center;gap:14px}
.top-pts{
  font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;
  background:linear-gradient(135deg,var(--amber),#ff8800);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 8px rgba(255,170,0,0.5));
}
.nav-btn{
  background:rgba(196,77,255,0.1);border:1px solid rgba(196,77,255,0.25);
  border-radius:8px;color:var(--purple);
  font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;
  padding:7px 14px;cursor:pointer;transition:all 0.2s;
}
.nav-btn:hover{background:rgba(196,77,255,0.2);border-color:rgba(196,77,255,0.5);box-shadow:0 0 16px rgba(196,77,255,0.2)}

/* ── CARDS ── */
.card{
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:20px;margin:14px;padding:20px;
  position:relative;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.08);
}
.card::before{
  content:'';position:absolute;top:0;left:30px;right:30px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,77,255,0.5),rgba(255,51,153,0.5),transparent);
  border-radius:1px;
}
.card-label{
  font-size:10px;letter-spacing:4px;color:var(--muted);
  margin-bottom:12px;font-weight:600;text-transform:uppercase;
}

/* ── STAT ROW ── */
.stat-row{display:flex;gap:14px;margin:14px}
.stat-box{
  flex:1;background:var(--card);border:1px solid var(--card-border);
  border-radius:20px;padding:16px 14px;text-align:center;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 8px 32px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.08);
  position:relative;overflow:hidden;
}
.stat-box::after{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:radial-gradient(ellipse at top,rgba(196,77,255,0.06),transparent 70%);
  pointer-events:none;
}
.stat-num{
  font-family:'Orbitron',sans-serif;font-size:30px;font-weight:900;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 12px rgba(196,77,255,0.5));
}
.stat-lbl{font-size:9px;letter-spacing:3px;color:var(--muted);margin-top:5px;font-weight:600}

/* Streak fire */
.streak-hot .stat-num{background:linear-gradient(135deg,#ffaa00,#ff6600)!important;-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 0 12px rgba(255,170,0,0.6))!important;animation:s-pulse 1.5s ease-in-out infinite}
.streak-fire .stat-num{background:linear-gradient(135deg,#ff3300,#ff8800)!important;-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 0 16px rgba(255,80,0,0.8))!important;animation:s-pulse 0.75s ease-in-out infinite}
@keyframes s-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* HEX RANK */
.hex-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.hex{
  width:58px;height:66px;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-size:7.5px;font-weight:900;letter-spacing:0.5px;
  transition:all 0.5s;color:#fff;
}
.hex-ROOKIE{background:linear-gradient(135deg,rgba(196,77,255,0.7),rgba(255,51,153,0.5));box-shadow:0 0 20px rgba(196,77,255,0.5)}
.hex-ATHLETE{background:linear-gradient(135deg,rgba(0,212,255,0.7),rgba(196,77,255,0.5));box-shadow:0 0 20px rgba(0,212,255,0.5)}
.hex-BEAST{background:linear-gradient(135deg,rgba(255,51,153,0.7),rgba(255,170,0,0.5));box-shadow:0 0 20px rgba(255,51,153,0.5)}
.hex-SAVAGE{background:linear-gradient(135deg,rgba(255,170,0,0.7),rgba(255,51,153,0.7),rgba(196,77,255,0.7));box-shadow:0 0 24px rgba(255,170,0,0.6)}

/* ── PROGRESS ── */
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:500}
.progress{height:6px;background:rgba(255,255,255,0.08);border-radius:6px;overflow:visible;position:relative}
.bar{
  height:100%;border-radius:6px;
  background:linear-gradient(90deg,var(--purple),var(--pink),var(--blue));
  background-size:200% auto;
  animation:bar-flow 3s linear infinite;
  box-shadow:0 0 12px rgba(196,77,255,0.6),0 0 24px rgba(255,51,153,0.3);
  transition:width 0.5s cubic-bezier(0.4,0,0.2,1);position:relative;
}
@keyframes bar-flow{from{background-position:0% center}to{background-position:200% center}}
.bar::after{
  content:'';position:absolute;right:-3px;top:50%;transform:translateY(-50%);
  width:12px;height:12px;border-radius:50%;
  background:white;box-shadow:0 0 8px var(--purple),0 0 20px var(--pink);
}

/* ── ACTION CARDS ── */
.action-card{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:20px;margin:14px;padding:18px 20px;
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 8px 32px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.08);
  transition:all 0.25s;position:relative;overflow:hidden;
}
.action-card::before{
  content:'';position:absolute;top:0;left:30px;right:30px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,77,255,0.3),rgba(255,51,153,0.3),transparent);
}
.action-card:hover{
  background:rgba(255,255,255,0.08);
  border-color:rgba(196,77,255,0.3);
  box-shadow:0 12px 40px rgba(0,0,0,0.3),0 0 30px rgba(196,77,255,0.1),inset 0 1px 0 rgba(255,255,255,0.12);
  transform:translateY(-2px);
}
.action-card.done{border-color:rgba(0,255,136,0.3);box-shadow:0 8px 32px rgba(0,0,0,0.25),0 0 20px rgba(0,255,136,0.08)}
.action-left{display:flex;align-items:center;gap:16px}
.action-icon{font-size:28px;transition:transform 0.3s;filter:drop-shadow(0 0 8px rgba(196,77,255,0.4))}
.action-card:hover .action-icon{transform:scale(1.2) rotate(-5deg)}
.action-name{font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:2px;color:var(--text);font-weight:700}
.action-sub{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500}
.done-check{
  color:var(--green);font-size:20px;
  filter:drop-shadow(0 0 8px rgba(0,255,136,0.8));
  animation:pop-in 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes pop-in{0%{transform:scale(0) rotate(-20deg)}100%{transform:scale(1) rotate(0deg)}}

/* ── BADGES ── */
.badge{
  display:inline-block;
  background:linear-gradient(135deg,rgba(196,77,255,0.2),rgba(255,51,153,0.15));
  border:1px solid rgba(196,77,255,0.4);
  border-radius:20px;
  color:var(--purple);font-size:10px;letter-spacing:2px;padding:4px 12px;margin:3px;
  box-shadow:0 0 12px rgba(196,77,255,0.2);font-weight:600;
}
#badges-wrap{margin-top:10px;min-height:30px}
.challenge-text{font-size:14px;color:var(--text);margin:10px 0 16px;font-weight:500;line-height:1.5}

/* ── ANIM OVERLAY ── */
#anim-overlay{
  position:fixed;inset:0;z-index:100;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(13,1,24,0.88);backdrop-filter:blur(16px);
}
#anim-overlay.show{display:flex}
.anim-fig{width:130px;height:170px}
.anim-fig svg{width:100%;height:100%;filter:drop-shadow(0 0 10px #c44dff) drop-shadow(0 0 28px rgba(196,77,255,0.5))}
.anim-fig svg.green-glow{filter:drop-shadow(0 0 10px #00ff88) drop-shadow(0 0 28px rgba(0,255,136,0.5))}
.anim-pts{
  font-family:'Orbitron',sans-serif;font-size:38px;font-weight:900;
  background:linear-gradient(135deg,#c44dff,#ff3399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 16px rgba(196,77,255,0.8));
  animation:pts-float 1.5s ease-out forwards;margin-top:20px;
}
.anim-pts.green{background:linear-gradient(135deg,#00ff88,#00d4ff)!important;filter:drop-shadow(0 0 16px rgba(0,255,136,0.8))!important}
.anim-lbl{font-size:11px;letter-spacing:4px;color:var(--muted);animation:pts-float 1.5s ease-out forwards;animation-delay:0.1s;margin-top:8px;font-weight:600}
@keyframes pts-float{0%{opacity:0;transform:translateY(20px) scale(0.8)}30%{opacity:1;transform:translateY(0) scale(1.1)}70%{opacity:1;transform:translateY(-10px)}100%{opacity:0;transform:translateY(-40px) scale(0.9)}}

/* ── LEVEL UP CANVAS ── */
#levelup-canvas{position:fixed;inset:0;z-index:200;display:none;pointer-events:none}

/* ── PROFILE ── */
.profile-section{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:20px;margin:14px;padding:22px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 8px 32px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.08);
  position:relative;
}
.profile-section::before{
  content:'';position:absolute;top:0;left:30px;right:30px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,77,255,0.5),rgba(255,51,153,0.5),transparent);
}
.section-title{
  font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:4px;
  color:var(--muted);margin-bottom:18px;padding-bottom:10px;
  border-bottom:1px solid rgba(255,255,255,0.06);font-weight:700;
}
.field-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.field-group{flex:1;min-width:90px}
.field-label{font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:7px;display:block;font-weight:600}

/* ── GAUGES ── */
.gauges-row{display:flex;gap:28px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.gauge{
  width:120px;height:120px;border-radius:50%;position:relative;
  mask:radial-gradient(circle,transparent 41px,black 42px);
  -webkit-mask:radial-gradient(circle,transparent 41px,black 42px);
  transition:background 0.6s;
}
.gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-val{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;color:var(--text)}
.gauge-sub{font-size:8px;letter-spacing:2px;color:var(--muted);margin-top:2px;font-weight:600}
.gauge-lbl{font-size:10px;letter-spacing:3px;color:var(--muted);font-weight:600}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.calc-stat{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
  border-radius:14px;padding:16px;text-align:center;
}
.calc-val{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.calc-lbl{font-size:9px;letter-spacing:2px;color:var(--muted);margin-top:5px;font-weight:600}
.incomplete-msg{color:var(--muted);font-size:12px;letter-spacing:2px;text-align:center;padding:24px 0}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <div class="splash-box">
    <div class="logo">FITRANK X</div>
    <div class="tagline" id="tagline"></div>
    <input id="n" class="tron-input" placeholder="Enter your name..." autocomplete="off">
    <button class="btn" onclick="startApp()">INITIALIZE</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="screen">
  <div class="top">
    <div class="top-name" id="user"></div>
    <div class="top-right">
      <div class="top-pts" id="pts">0 PTS</div>
      <button class="nav-btn" onclick="showScreen('profile');loadProfileFields();renderCalc()">PROFILE</button>
    </div>
  </div>

  <div class="stat-row">
    <div class="stat-box">
      <div id="streak-wrap">
        <div class="stat-num" id="streak">0</div>
      </div>
      <div class="stat-lbl">DAY STREAK</div>
    </div>
    <div class="stat-box">
      <div class="hex-wrap">
        <div class="hex hex-ROOKIE" id="hex">ROOKIE</div>
      </div>
      <div class="stat-lbl" style="margin-top:6px">RANK</div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Rank Progress</div>
    <div class="progress-label"><span id="lvl2">ROOKIE</span><span id="pct">0%</span></div>
    <div class="progress"><div id="bar" class="bar" style="width:0%"></div></div>
  </div>

  <div class="action-card" id="walk-card">
    <div class="action-left">

let s={name:'',pts:0,streak:0,last:null,walk:false,work:false,bonus:false,challengeDone:false,badges:[],challenge:'',profile:{age:'',gender:'',ft:'',in:'',weight:'',goal:'',activity:''}}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
function getAudio(){if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function playBlip(freq=800,dur=0.1,type='sine'){
  try{
    const ctx=getAudio(),osc=ctx.createOscillator(),gain=ctx.createGain()
    osc.connect(gain);gain.connect(ctx.destination);osc.type=type
    osc.frequency.setValueAtTime(freq,ctx.currentTime)
    osc.frequency.exponentialRampToValueAtTime(freq*1.5,ctx.currentTime+dur*0.4)
    gain.gain.setValueAtTime(0.1,ctx.currentTime)
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur)
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur)
  }catch(e){}
}
function playClick(){playBlip(600,0.08)}
function playLog(){playBlip(900,0.1);setTimeout(()=>playBlip(1200,0.08),90)}
function playLevelUp(){[300,450,600,900,1200,1800].forEach((f,i)=>setTimeout(()=>playBlip(f,0.2,'sine'),i*110))}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function showScreen(id){document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));document.getElementById(id).classList.add('active');playClick()}

// ── CORE ──────────────────────────────────────────────────────────────────────
function startApp(){s.name=document.getElementById('n').value||'Operator';save();showScreen('app');update()}
function today(){return new Date().toDateString()}
function newDay(){
  if(s.last!==today()){
    if(s.walk&&s.work) s.streak++; else s.streak=0
    s.walk=false;s.work=false;s.bonus=false;s.challengeDone=false
    s.last=today();genChallenge()
  }
}
function addPts(p){let m=s.streak>=7?1.25:s.streak>=3?1.1:1;s.pts+=Math.floor(p*m)}

function doWalk(){
  newDay()
  if(!s.walk){
    const prev=level()[0];s.walk=true;addPts(20)
    showAnim('run',20,'Walk Logged','purple');playLog()
    if(level()[0]!==prev) setTimeout(()=>showLevelUp(level()[0]),1800)
  }
  save();update()
}
function doWork(){
  newDay()
  if(!s.work){
    const prev=level()[0];s.work=true;addPts(10)
    let earned=10
    if(s.walk&&!s.bonus){addPts(30);s.bonus=true;earned+=30}
    showAnim('lift',earned,earned>10?'Combo Bonus!':'Workout Logged','purple');playLog()
    if(level()[0]!==prev) setTimeout(()=>showLevelUp(level()[0]),1800)
  }
  save();update()
}
function doChallenge(){
  newDay()
  if(!s.challengeDone){
    const prev=level()[0]
    addPts(40);s.challengeDone=true;unlockBadge('CHALLENGER')
    showAnim('win',40,'Mission Complete','green');playLog()
    if(level()[0]!==prev) setTimeout(()=>showLevelUp(level()[0]),1800)
  }
  save();update()
}
function level(){
  if(s.pts<500) return['ROOKIE',s.pts/500]
  if(s.pts<1500) return['ATHLETE',(s.pts-500)/1000]
  if(s.pts<4000) return['BEAST',(s.pts-1500)/2500]
  return['SAVAGE',1]
}
function genChallenge(){
  const list=["Complete both tasks today","Earn 50 pts","Keep your streak alive","Just show up","Go the extra mile","Log both activities"]
  s.challenge=list[Math.floor(Math.random()*list.length)]
}
function unlockBadge(b){if(!s.badges.includes(b))s.badges.push(b)}

// ── ODOMETER ─────────────────────────────────────────────────────────────────
function animatePts(to){
  const from=displayedPts,dur=600,t0=performance.now()
  function tick(now){
    const t=Math.min((now-t0)/dur,1),ease=1-Math.pow(1-t,3)
    displayedPts=Math.floor(from+(to-from)*ease)
    document.getElementById('pts').innerText=displayedPts+' PTS'
    if(t<1) requestAnimationFrame(tick); else displayedPts=to
  }
  requestAnimationFrame(tick)
}

  else{ob.innerHTML='LOG';ob.disabled=false;oc.classList.remove('done')}
  if(s.challengeDone){cb.innerHTML='Completed ✓';cb.disabled=true}

// ── LEVEL UP IMPLOSION ────────────────────────────────────────────────────────
function showLevelUp(rank){
  playLevelUp()
  const canvas=document.getElementById('levelup-canvas'),ctx=canvas.getContext('2d')
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;canvas.style.display='block'
  const cx=canvas.width/2,cy=canvas.height/2,maxR=Math.hypot(cx,cy)*1.15

  const colors=['#c44dff','#ff3399','#00d4ff','#ffffff','#ff3399','#c44dff','#00ff88']
  const pts=Array.from({length:130},(_,i)=>{
    const a=Math.random()*Math.PI*2,r=maxR+Math.random()*80
    return{sx:cx+Math.cos(a)*r,sy:cy+Math.sin(a)*r,ex:cx+(Math.random()-0.5)*50,ey:cy+(Math.random()-0.5)*50,size:Math.random()*2.5+0.5,col:colors[Math.floor(Math.random()*colors.length)],trail:[]}
  })

  const rankColors={ROOKIE:'#c44dff',ATHLETE:'#00d4ff',BEAST:'#ff3399',SAVAGE:'#ffaa00'}
  const rc=rankColors[rank]||'#c44dff'
  const T=2800,t0=performance.now()
  const eIn=t=>t*t*t,eOut=t=>1-Math.pow(1-t,3)
  const PH={implode:0.26,flash:0.32,shock:0.72,hold:0.86,fade:1.0}

  function draw(now){
    const e=now-t0,pg=e/T
    if(pg>=1){canvas.style.display='none';return}
    ctx.clearRect(0,0,canvas.width,canvas.height)

    let bgA=pg<PH.implode?0.75*(pg/PH.implode):0.9
    ctx.fillStyle=`rgba(13,1,24,${bgA})`;ctx.fillRect(0,0,canvas.width,canvas.height)

    if(pg<PH.implode){
      const t=eIn(pg/PH.implode)
      const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,180*(1-t)+10)
      grd.addColorStop(0,`rgba(196,77,255,${t*0.45})`);grd.addColorStop(0.5,`rgba(255,51,153,${t*0.2})`);grd.addColorStop(1,'transparent')
      ctx.fillStyle=grd;ctx.fillRect(0,0,canvas.width,canvas.height)
      pts.forEach(p=>{
        const x=p.sx+(p.ex-p.sx)*t,y=p.sy+(p.ey-p.sy)*t
        p.trail.push({x,y,c:p.col});if(p.trail.length>10) p.trail.shift()
        p.trail.forEach((pt,i)=>{
          const a=(i/p.trail.length)*0.4*t
          const rgb=pt.c.startsWith('#')?`${parseInt(pt.c.slice(1,3),16)},${parseInt(pt.c.slice(3,5),16)},${parseInt(pt.c.slice(5,7),16)}`:'196,77,255'
          ctx.beginPath();ctx.arc(pt.x,pt.y,p.size*0.5,0,Math.PI*2)
          ctx.fillStyle=`rgba(${rgb},${a})`;ctx.fill()
        })
        ctx.beginPath();ctx.arc(x,y,p.size,0,Math.PI*2)
        ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0
      })

    } else if(pg<PH.flash){
      const t=(pg-PH.implode)/(PH.flash-PH.implode),fa=Math.sin(t*Math.PI)
      ctx.fillStyle=`rgba(196,77,255,${fa*0.7})`;ctx.fillRect(0,0,canvas.width,canvas.height)
      ctx.fillStyle=`rgba(255,255,255,${fa*0.45})`;ctx.fillRect(0,0,canvas.width,canvas.height)

    } else if(pg<PH.hold){
      const t=(pg-PH.flash)/(PH.hold-PH.flash)
      pts.forEach((p,i)=>{
        const a=(i/pts.length)*Math.PI*2,d=eOut(t)*maxR*1.3
        const x=cx+Math.cos(a)*d,y=cy+Math.sin(a)*d,al=Math.max(0,1-t*2)
        if(al<=0) return
        ctx.beginPath();ctx.arc(x,y,p.size,0,Math.PI*2)
        ctx.fillStyle=p.col.replace(')',`,${al})`).replace('rgb','rgba').replace('#'+p.col.slice(1),`rgba(${parseInt(p.col.slice(1,3),16)},${parseInt(p.col.slice(3,5),16)},${parseInt(p.col.slice(5,7),16)},${al})`)
        // simpler:
        ctx.fillStyle=`rgba(196,77,255,${al})`;ctx.fill()
      })
      // Shockwave rings - purple, pink, blue
      const ringColors=['rgba(196,77,255,','rgba(255,51,153,','rgba(0,212,255,']
      for(let r=0;r<3;r++){
        const delay=r*0.14,rt=Math.max(0,(t-delay)/(1-delay));if(rt<=0) continue
        const rad=eOut(rt)*maxR,al=Math.max(0,(1-rt)*0.95)
        ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2)
        ctx.strokeStyle=ringColors[r]+al+')'
        ctx.lineWidth=r===0?4:r===1?2:1
        ctx.shadowColor=r===0?'#c44dff':r===1?'#ff3399':'#00d4ff';ctx.shadowBlur=r===0?30:12
        ctx.stroke();ctx.shadowBlur=0
      }
      // Center glow
      const ig=Math.max(0,1-t*4)
      if(ig>0){
        const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,100*ig)
        gr.addColorStop(0,`rgba(196,77,255,${ig*0.6})`);gr.addColorStop(0.5,`rgba(255,51,153,${ig*0.3})`);gr.addColorStop(1,'transparent')
        ctx.fillStyle=gr;ctx.fillRect(0,0,canvas.width,canvas.height)
      }
      // Text
      const tt=Math.max(0,(t-0.2)/0.5)
      if(tt>0){
        const sc=0.5+eOut(tt)*0.5
        ctx.save();ctx.globalAlpha=eOut(tt);ctx.translate(cx,cy)
        ctx.font=`900 ${Math.floor(72*sc)}px 'Orbitron',sans-serif`
        ctx.textAlign='center';ctx.textBaseline='middle'
        ctx.shadowColor='#c44dff';ctx.shadowBlur=50;ctx.fillStyle='#ffffff'
        ctx.fillText('RANK UP',0,-52*sc)
        ctx.font=`700 ${Math.floor(52*sc)}px 'Orbitron',sans-serif`
        ctx.shadowColor=rc;ctx.shadowBlur=35;ctx.fillStyle=rc
        ctx.fillText(rank,0,18*sc)
        const lw=130*sc;ctx.shadowBlur=0
        ctx.strokeStyle=`rgba(196,77,255,${eOut(tt)*0.4})`;ctx.lineWidth=1
        ctx.beginPath();ctx.moveTo(-lw,-8);ctx.lineTo(lw,-8);ctx.stroke()
        ctx.beginPath();ctx.moveTo(-lw,60*sc);ctx.lineTo(lw,60*sc);ctx.stroke()
        ctx.restore()
      }

    } else if(pg<PH.fade){
      ctx.save();ctx.translate(cx,cy)
      ctx.font=`900 72px 'Orbitron',sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle'
      ctx.shadowColor='#c44dff';ctx.shadowBlur=50;ctx.fillStyle='#ffffff';ctx.fillText('RANK UP',0,-52)
      ctx.font=`700 52px 'Orbitron',sans-serif`;ctx.shadowColor=rc;ctx.shadowBlur=35;ctx.fillStyle=rc;ctx.fillText(rank,0,18)
      ctx.restore()

    } else {
      const t=(pg-PH.hold)/(PH.fade-PH.hold)
      ctx.save();ctx.globalAlpha=1-t;ctx.translate(cx,cy)
      ctx.font=`900 72px 'Orbitron',sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle'
      ctx.shadowColor='#c44dff';ctx.shadowBlur=50;ctx.fillStyle='#ffffff';ctx.fillText('RANK UP',0,-52)
      ctx.font=`700 52px 'Orbitron',sans-serif`;ctx.shadowColor=rc;ctx.shadowBlur=35;ctx.fillStyle=rc;ctx.fillText(rank,0,18)
      ctx.restore()
      ctx.fillStyle=`rgba(13,1,24,${t})`;ctx.fillRect(0,0,canvas.width,canvas.height)
    }
    requestAnimationFrame(draw)
  }
  requestAnimationFrame(draw)
}

}
function saveProfile(){
  s.profile={age:document.getElementById('p-age').value,gender:document.getElementById('p-gender').value,ft:document.getElementById('p-ft').value,in:document.getElementById('p-in').value,weight:document.getElementById('p-weight').value,goal:document.getElementById('p-goal').value,activity:document.getElementById('p-activity').value}
  save();renderCalc();playLog()
}
function renderCalc(){
  const p=s.profile,out=document.getElementById('calc-output')
  if(!p.age||!p.gender||!p.ft||!p.weight||!p.activity){out.innerHTML='<div class="incomplete-msg">Complete your profile to view analysis</div>';return}
  const wKg=parseFloat(p.weight)*0.453592,hCm=(parseFloat(p.ft)*12+parseFloat(p.in||0))*2.54,age=parseInt(p.age)
  const bmi=wKg/((hCm/100)**2)
  let bmiLbl='',bc='#c44dff'
  if(bmi<18.5){bmiLbl='Underweight';bc='#00d4ff'}
  else if(bmi<25){bmiLbl='Normal';bc='#00ff88'}
  else if(bmi<30){bmiLbl='Overweight';bc='#ffaa00'}
  else{bmiLbl='Obese';bc='#ff3399'}
  let bmr=p.gender==='male'?10*wKg+6.25*hCm-5*age+5:10*wKg+6.25*hCm-5*age-161
  const mult={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,veryActive:1.9}
  const tdee=Math.round(bmr*(mult[p.activity]||1.2))
  const targets={lose:tdee-500,gain:tdee+300,maintain:tdee,endurance:tdee+200}
  const target=Math.round(targets[p.goal]||tdee)
  const bmiDeg=Math.min(1,Math.max(0,(bmi-15)/25))*360
  const calDeg=Math.min(1,target/Math.max(tdee+600,target+200))*360

  out.innerHTML=`
    <div class="gauges-row">
      <div class="gauge-wrap">
        <div class="gauge" id="bmi-g">
          <div class="gauge-center">
            <div class="gauge-val" style="color:${bc}">${bmi.toFixed(1)}</div>
            <div class="gauge-sub">${bmiLbl}</div>
          </div>
        </div>
        <div class="gauge-lbl">BMI</div>
      </div>
      <div class="gauge-wrap">
        <div class="gauge" id="cal-g">
          <div class="gauge-center">
            <div class="gauge-val" style="color:#ffaa00">${target}</div>
            <div class="gauge-sub">kcal/day</div>
          </div>
        </div>
        <div class="gauge-lbl">Target Calories</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="calc-stat"><div class="calc-val">${Math.round(bmr)}</div><div class="calc-lbl">BMR (kcal)</div></div>
      <div class="calc-stat"><div class="calc-val">${tdee}</div><div class="calc-lbl">TDEE (kcal)</div></div>
      <div class="calc-stat" style="grid-column:span 2;border-color:rgba(255,255,255,0.05)">
        <div style="font-size:12px;color:rgba(240,230,255,0.4);letter-spacing:1px;line-height:2">
          ${p.ft}'${p.in||0}" &nbsp;·&nbsp; ${p.weight} lbs &nbsp;·&nbsp; Age ${age}
          ${p.goal?'&nbsp;·&nbsp; '+{lose:'Weight Loss',gain:'Muscle Gain',maintain:'Maintenance',endurance:'Endurance'}[p.goal]:''}
        </div>
      </div>
    </div>`

  setTimeout(()=>{
    const bg=document.getElementById('bmi-g'),cg=document.getElementById('cal-g')
    if(bg) bg.style.background=`conic-gradient(${bc} 0deg ${bmiDeg}deg,rgba(255,255,255,0.06) ${bmiDeg}deg 360deg)`
    if(cg) cg.style.background=`conic-gradient(#ffaa00 0deg ${calDeg}deg,rgba(255,255,255,0.06) ${calDeg}deg 360deg)`
  },50)
}

// ── INIT ──────────────────────────────────────────────────────────────────────
load()
typewriter(document.getElementById('tagline'),'Performance Tracking System',60)
if(s.name){displayedPts=s.pts;showScreen('app');update()}else{genChallenge()}
</script>
</body>
